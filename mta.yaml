_schema-version: '3.1'
ID: sap-copilot
version: 1.0.0
description: "SAP Copilot: Enterprise Knowledge & Action AI"
parameters:
  enable-parallel-executions: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx -p @sap/cds-dk cds build --production

modules:
  - name: sap-copilot-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

resources:
  - name: sap-copilot-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
